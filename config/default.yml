vault:
  path: ~/hwicortex-vault

sessions:
  watch_dirs:
    - ~/.claude/projects
    - ~/.codex/sessions
  idle_timeout_minutes: 10

llm:
  default: claude
  claude:
    api_key: ${ANTHROPIC_API_KEY}
    model: claude-sonnet-4-6
  local:
    model_path: ~/.hwicortex/models/default.gguf
  budget:
    max_tokens_per_run: 500000
    warn_threshold: 100000

ingest:
  collections: []

research:
  models:
    card:  claude-haiku-4-5
    synth: claude-sonnet-4-6
    draft: claude-sonnet-4-6
  search:
    provider: brave
    brave:
      api_key: ${BRAVE_SEARCH_API_KEY}
    tavily:
      api_key: ${TAVILY_API_KEY}
  fetch:
    user_agent: "hwicortex-research/0.1"
    rate_limit_per_domain_qps: 1
    timeout_ms: 30000
    max_redirects: 5
  budget:
    max_new_urls: 100
    max_total_bytes: 50000000
    max_llm_cost_usd: 0.50
  draft:
    default_top_k: 12
    include_vault_default: false
